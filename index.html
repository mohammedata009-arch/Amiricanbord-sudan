<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار هندسة العمليات والتفكير التصميمي</title>
    <style>
        :root {
            --primary: #16a085;
            --secondary: #27ae60;
            --accent: #f39c12;
            --dark: #2c3e50;
            --light: #f4f7f6;
            --white: #ffffff;
            --wa-color: #25D366;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #16a085 0%, #2c3e50 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
            padding: 10px;
        }

        #main-card {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 { color: var(--primary); margin: 0; font-size: 1.5rem; border-bottom: 3px solid var(--accent); display: inline-block; padding-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin: 10px 0 20px; font-size: 0.9rem; }

        .progress-container { background: #eee; height: 10px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #progress-bar { background: var(--secondary); width: 0%; height: 100%; transition: width 0.4s; }

        .question-text { font-size: 1.25rem; font-weight: bold; margin-bottom: 20px; min-height: 60px; line-height: 1.6; }

        .options-grid { display: grid; gap: 12px; }
        .opt-btn {
            padding: 15px;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            background: var(--white);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.2s;
            text-align: right;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--primary); background: #e8f8f5; }
        
        .correct { background: var(--secondary) !important; color: white; border-color: var(--secondary) !important; }
        .wrong { background: var(--error) !important; color: white; border-color: var(--error) !important; }

        #explanation-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            background: #fff9db;
            border-right: 5px solid var(--accent);
            text-align: right;
            font-size: 0.95rem;
            animation: fadeIn 0.5s;
        }

        #result-screen { display: none; }
        .score-circle { width: 100px; height: 100px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; margin: 0 auto 20px; color: white; }

        .fee-tag {
            background: #fdf2f2;
            color: #c0392b;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            margin: 20px 0;
            border: 2px dashed #e74c3c;
        }

        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 1.1rem; }

        .btn-wa { background: var(--wa-color); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="main-card">
    <div id="quiz-screen">
        <h1>🚀 الهندسة الإدارية والتفكير التصميمي</h1>
        <p class="subtitle">إشراف الأستاذ: محمد طه عطا المنان</p>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="question" class="question-text">جاري تحميل الاختبار...</div>
        <div id="options" class="options-grid"></div>
        <div id="explanation-box"></div>
    </div>

    <div id="result-screen">
        <div class="score-circle" id="final-score">0</div>
        <h2>أحسنتم يا مبدعين!</h2>
        <p>يرجى كتابة الاسم الثلاثي لاستخراج الشهادة</p>
        
        <input type="text" id="trainee-name" placeholder="اسم المتدرب بالكامل">
        
        <div class="fee-tag">
            🎫 رسوم الشهادة المعتمدة: 7,000 جنيه سوداني
        </div>

        <button class="btn-wa" onclick="sendWhatsApp()">
            إرسال النتيجة واعتماد الشهادة
        </button>
    </div>
</div>

<audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    const quizData = [
        { 
            q: "يا متدربين، ما هو المفهوم الجوهري لـ 'هندسة العمليات الإدارية' (BPR)؟", 
            a: ["تحسين الخطوات الحالية ببطء", "إعادة تصميم العمليات جذرياً من الصفر", "زيادة عدد ساعات العمل"], 
            c: 1,
            exp: "شرح: هندسة العمليات لا ترمم القديم، بل تعيد بناء العملية من الأساس لتحقيق طفرات كبرى في الأداء والجودة."
        },
        { 
            q: "ما هي أول خطوة في منهجية 'التفكير التصميمي' (Design Thinking)؟", 
            a: ["تصميم النموذج الأولي", "التعاطف وفهم احتياجات المستخدم", "اختبار المنتج في السوق"], 
            c: 1,
            exp: "شرح: نبدأ دائماً بالتعاطف لوضع أنفسنا مكان المستخدم وفهم مشاكله الحقيقية قبل اقتراح أي حلول."
        },
        { 
            q: "متى تلجأ المؤسسة إلى إعادة هندسة عملياتها (BPR)؟", 
            a: ["عند وجود بطء شديد وتداخل في المسؤوليات وفشل في الأداء", "عندما تكون الأرباح ممتازة", "عند تغيير أثاث المكاتب"], 
            c: 0,
            exp: "شرح: البيروقراطية الزائدة وتجزئة العمليات هي أهم الدوافع التي تستوجب نسف النظام القديم وإعادة هندسته."
        },
        { 
            q: "يا متدربين، ما الهدف من مرحلة الـ (Prototyping) في التفكير التصميمي؟", 
            a: ["صناعة نسخة نهائية غالية الثمن", "تجربة الأفكار بسرعة وتكلفة بسيطة للتعلم من الأخطاء", "إبهار المنافسين فقط"], 
            c: 1,
            exp: "شرح: النماذج الأولية تهدف للفشل السريع والرخيص من أجل الوصول للحل الأمثل قبل الاستثمار الضخم."
        },
        { 
            q: "ماذا يقصد بـ 'التفكير التباعدي' في مرحلة ابتكار الحلول؟", 
            a: ["التركيز على فكرة واحدة فقط", "توليد أكبر قدر ممكن من الأفكار دون قيود أو أحكام", "انتقاد أفكار الآخرين"], 
            c: 1,
            exp: "شرح: التفكير التباعدي يهدف لفتح آفاق الإبداع واستكشاف كافة الاحتمالات قبل مرحلة التصفية والتركيز."
        },
        { 
            q: "أي من هذه العناصر يعتبر 'ُممكناً' أساسياً لنجاح هندسة العمليات؟", 
            a: ["تكنولوجيا المعلومات (IT)", "تقليل الإجازات السنوية", "زيادة عدد الاجتماعات الروتينية"], 
            c: 0,
            exp: "شرح: التكنولوجيا هي المحرك الذي يكسر القواعد القديمة ويسمح بمشاركة المعلومات والسرعة الفائقة في التنفيذ."
        },
        { 
            q: "ماذا نعني بـ 'بيان المشكلة' في مرحلة التعريف (Define)؟", 
            a: ["قائمة بأسماء الموظفين المخطئين", "صياغة مركزة للمشكلة بناءً على رؤى المستخدمين", "تقرير مالي عن خسائر الشركة"], 
            c: 1,
            exp: "شرح: بيان المشكلة يحدد الوجهة التي سيتجه إليها الابتكار لضمان حل المشكلة الحقيقية للإنسان."
        },
        { 
            q: "الفرق بين التحسين المستمر (Kaizen) وإعادة الهندسة (BPR) هو:", 
            a: ["BPR تغيير جذري وشامل، بينما كايزن تغيير تدريجي", "كايزن للمكاتب وBPR للمصانع", "لا يوجد فرق بينهما"], 
            c: 0,
            exp: "شرح: كايزن يرمم ويحسن، أما BPR فتهدم وتبني من جديد لتحقيق نتائج استثنائية."
        },
        { 
            q: "يا متدربين، لماذا نركز على 'المستخدم' في التفكير التصميمي؟", 
            a: ["لأنه يدفع المال فقط", "لضمان ابتكار حلول إنسانية تلبي احتياجاته الحقيقية", "لأنه دائماً على حق"], 
            c: 1,
            exp: "شرح: التفكير التصميمي هو منهجية متمحورة حول الإنسان؛ فالحل الذي لا يخدم المستخدم هو حل فاشل استراتيجياً."
        },
        { 
            q: "في إعادة الهندسة، يتم التركيز على (العمليات) بدلاً من:", 
            a: ["العملاء", "الإدارات والوظائف المنعزلة", "التقنية الحديثة"], 
            c: 1,
            exp: "شرح: BPR تكسر الحواجز بين الأقسام وتنظر للعملية كتدفق مستمر يحقق قيمة للعميل من البداية للنهاية."
        }
    ];

    let current = 0;
    let score = 0;

    function renderQuestion() {
        if (current >= quizData.length) { showResults(); return; }
        
        const q = quizData[current];
        document.getElementById("question").innerText = q.q;
        document.getElementById("explanation-box").style.display = "none";
        document.getElementById("progress-bar").style.width = ((current + 1) / quizData.length * 100) + "%";
        
        const optsDiv = document.getElementById("options");
        optsDiv.innerHTML = "";
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => check(i, btn);
            optsDiv.appendChild(btn);
        });
    }

    function check(idx, btn) {
        const correct = quizData[current].c;
        const explanation = quizData[current].exp;
        const allBtns = document.querySelectorAll(".opt-btn");
        allBtns.forEach(b => b.disabled = true);

        const expBox = document.getElementById("explanation-box");
        expBox.innerText = explanation;
        expBox.style.display = "block";

        if (idx === correct) {
            btn.classList.add("correct");
            document.getElementById("sound-correct").play();
            score++;
        } else {
            btn.classList.add("wrong");
            allBtns[correct].classList.add("correct");
            document.getElementById("sound-wrong").play();
        }

        setTimeout(() => {
            current++;
            renderQuestion();
        }, 5000); 
    }

    function showResults() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score").innerText = score + " / " + quizData.length;
    }

    function sendWhatsApp() {
        const name = document.getElementById("trainee-name").value;
        if (!name) { alert("لطفاً اكتبوا أسماءكم يا متدربين"); return; }
        
        const msg = encodeURIComponent(`السلام عليكم أستاذ محمد طه،\nأنا المتدرب: ${name}\nأكملت اختبار "هندسة العمليات والتفكير التصميمي" بنجاح.\nالنتيجة: ${score} من 10\nأرغب في الحصول على الشهادة المعتمدة (الرسوم: 7000 ج.س).`);
        window.open(`https://wa.me/249999240574?text=${msg}`);
    }

    renderQuestion();
</script>

</body>
</html>
