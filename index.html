<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار دورة قوة التحفيز - الأستاذ محمد طه</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --accent: #fdcb6e;
            --dark: #2d3436;
            --light: #dfe6e9;
            --white: #ffffff;
            --wa-color: #25D366;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
            padding: 10px;
        }

        #main-card {
            background: var(--white);
            width: 100%;
            max-width: 550px;
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        #main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 8px;
            background: linear-gradient(to right, var(--accent), var(--secondary), var(--primary));
        }

        h1 { color: var(--primary); margin-bottom: 5px; font-size: 1.7rem; }
        .subtitle { color: #636e72; margin-bottom: 25px; font-size: 0.9rem; }

        .progress-container {
            background: var(--light);
            height: 10px;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        #progress-bar {
            background: var(--secondary);
            width: 0%;
            height: 100%;
            transition: width 0.4s ease;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 25px;
            min-height: 50px;
            color: var(--dark);
            line-height: 1.5;
        }

        .options-grid { display: grid; gap: 12px; }
        
        .opt-btn {
            padding: 16px;
            border: 2px solid var(--light);
            border-radius: 15px;
            background: var(--white);
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: right;
        }

        .opt-btn:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            background: #f9f8ff;
        }

        .correct { background: var(--secondary) !important; color: white; border-color: var(--secondary) !important; }
        .wrong { background: #ff7675 !important; color: white; border-color: #ff7675 !important; }

        #result-screen { display: none; }
        .score-circle {
            width: 110px; height: 110px;
            background: var(--accent);
            color: var(--dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(253, 203, 110, 0.4);
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--light);
            border-radius: 12px;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
        }

        .fee-badge {
            background: #fff9e6;
            color: #d35400;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px dashed var(--accent);
            font-size: 0.95rem;
        }

        .btn-wa {
            background: var(--wa-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 15px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .footer-text { margin-top: 20px; font-size: 0.8rem; color: #b2bec3; }

        @media print { .btn-wa, input, .progress-container, h1 { display: none; } }
    </style>
</head>
<body>

<div id="main-card">
    <div id="quiz-screen">
        <h1>🏆 اختبار قوة التحفيز</h1>
        <p class="subtitle">إشراف الأستاذ محمد طه عطا المنان</p>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="question" class="question-text">تحميل الأسئلة...</div>
        <div id="options" class="options-grid"></div>
    </div>

    <div id="result-screen">
        <div class="score-circle" id="final-score">0</div>
        <h2 id="congrats-msg">أحسنتم يا متدربين!</h2>
        <p>اكتبوا أسماءكم الثلاثية لطلب الشهادة المعتمدة</p>
        
        <input type="text" id="trainee-name" placeholder="أدخل اسمك هنا">
        
        <div class="fee-badge">
            🎫 رسوم الشهادة المعتمدة: 7,000 جنيه سوداني
        </div>

        <button class="btn-wa" onclick="sendWhatsApp()">
            ارسلوا النتيجة للواتساب واستلموا الشهادة
        </button>
        
        <p class="footer-text">منصة البرامج المتخصصة © 2026</p>
    </div>
</div>

<audio id="s-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="s-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    // الأسئلة مستخرجة بدقة من محاور الصور المرفقة
    const quizData = [
        { 
            q: "يا متدربين، أي مما يلي يعد من فوائد التحفيز وأهميته في بيئة العمل؟", 
            a: ["زيادة إنتاجية الموظفين", "رفع معدل الاستقالات", "زيادة التعب النفسي"], 
            c: 0 
        },
        { 
            q: "حسب المحور الثاني، ما هي النظرية التي تفسر الدوافع الإنسانية الأساسية؟", 
            a: ["نظرية المؤامرة", "نظرية ماسلو", "نظرية النسبية"], 
            c: 1 
        },
        { 
            q: "ينقسم التحفيز في علم النفس إلى نوعين رئيسيين، ما هما؟", 
            a: ["سريع وبطيء", "مادي وفوري", "داخلي وخارجي"], 
            c: 2 
        },
        { 
            q: "من مهارات التحفيز والقيادة، كيف تمنحون فريقكم القوة في الأداء؟", 
            a: ["عن طريق منح الفريق الثقة والحرية في التنفيذ", "عن طريق المراقبة اللصيقة لكل حركة", "عن طريق تجنب مكافأة الإنجازات"], 
            c: 0 
        },
        { 
            q: "في المحور الرابع المتعلق بالتسويق، ما هو المفتاح الأساسي لتحفيز العملاء؟", 
            a: ["إهمال رغباتهم", "فهم دوافع العميل (العاطفية والعملية)", "تصميم حملات عشوائية"], 
            c: 1 
        },
        { 
            q: "كيف يؤثر التحفيز والطب والعافية على أداء الدماغ؟", 
            a: ["النشاط البدني لا علاقة له بالدماغ", "التغذية السيئة تزيد التركيز", "النشاط البدني والنوم الكافي يعززان المزاج والطاقة"], 
            c: 2 
        },
        { 
            q: "يا متدربين، ما هي مواصفات الأهداف التي تعتبر أداة عملية للتحفيز؟", 
            a: ["أهداف غامضة وصعبة", "أهداف واضحة وقابلة للقياس", "أهداف بدون وقت محدد"], 
            c: 1 
        },
        { 
            q: "أي من هذه الأدوات العملية تساعد في تعزيز روح الفريق؟", 
            a: ["التغذية الراجعة الإيجابية", "التحفيز الفردي فقط", "تجاهل المبادرات"], 
            c: 0 
        },
        { 
            q: "في محور القيادة، ماذا يجب عليكم فعله تجاه الإنجازات والمبادرات؟", 
            a: ["تجاهلها لعدم الغرور", "مكافأتها وتشجيعها", "تأجيل شكرها لسنوات"], 
            c: 1 
        },
        { 
            q: "ما هو المحرك الأساسي الذي يدفع الأفراد والمنظمات نحو النجاح حسب المقدمة؟", 
            a: ["الروتين اليومي", "قوة التحفيز", "المنافسة السلبية"], 
            c: 1 
        }
    ];

    let current = 0;
    let score = 0;

    function renderQuestion() {
        if (current >= quizData.length) {
            showResults();
            return;
        }
        
        const q = quizData[current];
        document.getElementById("question").innerText = q.q;
        document.getElementById("progress-bar").style.width = ((current + 1) / quizData.length * 100) + "%";
        
        const optsDiv = document.getElementById("options");
        optsDiv.innerHTML = "";
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => check(i, btn);
            optsDiv.appendChild(btn);
        });
    }

    function check(idx, btn) {
        const correct = quizData[current].c;
        const allBtns = document.querySelectorAll(".opt-btn");
        allBtns.forEach(b => b.disabled = true);

        if (idx === correct) {
            btn.classList.add("correct");
            document.getElementById("s-correct").play();
            score++;
        } else {
            btn.classList.add("wrong");
            allBtns[correct].classList.add("correct");
            document.getElementById("s-wrong").play();
        }

        setTimeout(() => {
            current++;
            renderQuestion();
        }, 1100);
    }

    function showResults() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score").innerText = score;
        
        if(score < 5) document.getElementById("congrats-msg").innerText = "فرصة سعيدة، حاولوا مجدداً يا متدربين!";
    }

    function sendWhatsApp() {
        const name = document.getElementById("trainee-name").value;
        if (!name) { alert("لطفاً اكتبوا أسماءكم أولاً يا متدربين"); return; }
        
        const msg = encodeURIComponent(`السلام عليكم أستاذ محمد طه،\nأنا المتدرب(ة): ${name}\nأتممت اختبار دورة "قوة التحفيز" بنجاح.\nالنتيجة: ${score} من 10\nأرغب في الحصول على الشهادة المعتمدة.`);
        window.open(`https://wa.me/249999240574?text=${msg}`);
    }

    renderQuestion();
</script>

</body>
</html>
