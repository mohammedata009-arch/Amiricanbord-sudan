<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار التفاوض وأخلاقيات العمل</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #c0392b;
            --success: #27ae60;
            --info: #2980b9;
            --white: #ffffff;
            --wa-color: #25D366;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--primary);
            padding: 10px;
        }

        #main-card {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { color: var(--secondary); margin: 0; font-size: 1.6rem; border-bottom: 3px solid var(--primary); display: inline-block; padding-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin: 10px 0 20px; font-size: 0.9rem; font-weight: bold; }

        .progress-container { background: #eee; height: 10px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #progress-bar { background: var(--success); width: 0%; height: 100%; transition: width 0.4s; }

        .question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; min-height: 60px; line-height: 1.6; }

        .options-grid { display: grid; gap: 12px; }
        .opt-btn {
            padding: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 12px;
            background: var(--white);
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 600;
            transition: 0.2s;
            text-align: right;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--secondary); background: #fdf2f2; }
        
        .correct { background: var(--success) !important; color: white; border-color: var(--success) !important; }
        .wrong { background: var(--secondary) !important; color: white; border-color: var(--secondary) !important; }

        #explanation-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            background: #ebf5fb;
            border-right: 5px solid var(--info);
            text-align: right;
            font-size: 0.95rem;
            animation: fadeIn 0.5s;
        }

        #result-screen { display: none; }
        .score-circle { width: 100px; height: 100px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; margin: 0 auto 20px; color: white; box-shadow: 0 5px 15px rgba(192, 57, 43, 0.3); }

        .fee-tag {
            background: #fff5f5;
            color: #c0392b;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            margin: 20px 0;
            border: 2px dashed #e74c3c;
        }

        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 1.1rem; box-sizing: border-box; }

        .btn-wa { background: var(--wa-color); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-wa:hover { background: #1eb954; transform: scale(1.02); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="main-card">
    <div id="quiz-screen">
        <h1>اختبار التفاوض وأخلاقيات العمل</h1>
        <p class="subtitle">منصة البرامج التخصصية - م. محمد طه عطا المنان</p>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="question" class="question-text">جاري التحميل...</div>
        <div id="options" class="options-grid"></div>
        <div id="explanation-box"></div>
    </div>

    <div id="result-screen">
        <div class="score-circle" id="final-score">0</div>
        <h2>أحسنتم يا متدربين!</h2>
        <p>الرجاء إدخال اسمكم الثلاثي لاعتماد الشهادة</p>
        
        <input type="text" id="trainee-name" placeholder="الاسم الكامل للمتدرب">
        
        <div class="fee-tag">
            📜 رسوم الشهادة المعتمدة: 7,000 جنيه سوداني
        </div>

        <button class="btn-wa" onclick="sendWhatsApp()">
            إرسال النتيجة وطلب الشهادة
        </button>
    </div>
</div>

<audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    const quizData = [
        { 
            q: "يا متدربين، ما هو المبدأ الأساسي في 'تفاوض التكامل' (Integrative) الموضح في المحتوى؟", 
            a: ["تحقيق الفوز لطرف واحد فقط", "البحث عن حلول تحقق المنفعة المتبادلة (الكل رابح)", "استخدام الضغط لإجبار الطرف الآخر"], 
            c: 1,
            exp: "شرح: تفاوض التكامل يركز على توسيع القيمة وبناء علاقات مستدامة من خلال استراتيجية (اربح-اربح)."
        },
        { 
            q: "وفقاً لأخلاقيات العمل، ماذا تعني 'الأمانة المهنية' تجاه معلومات المؤسسة؟", 
            a: ["نشر الأسرار لزيادة الشفافية", "الحفاظ على سرية البيانات وعدم استغلالها شخصياً", "مشاركة المعلومات مع المنافسين"], 
            c: 1,
            exp: "شرح: الأمانة تقتضي صيانة خصوصية العمل وحماية معلوماته باعتبارها عهدة مهنية."
        },
        { 
            q: "لماذا يعد 'الاستماع النشط' مهارة تفاوضية وأخلاقية هامة؟", 
            a: ["لانتظار الفرصة للرد بقوة", "لفهم احتياجات الطرف الآخر وبناء جسور الثقة", "لتسجيل أخطاء الطرف الآخر"], 
            c: 1,
            exp: "شرح: الاستماع الفعال يساعد في اكتشاف المصالح الحقيقية للطرف الآخر ويظهر الاحترام المتبادل."
        },
        { 
            q: "ما هو التصرف الأخلاقي السليم عند مواجهة 'تضارب مصالح' في العمل؟", 
            a: ["تجاهل الأمر تماماً", "الإفصاح الفوري للإدارة والانسحاب من القرار", "العمل سراً لموازنة المصالح"], 
            c: 1,
            exp: "شرح: النزاهة تقتضي الشفافية الكاملة والابتعاد عن أي موقف يؤثر على حيادية القرار المهني."
        },
        { 
            q: "أي من الآتي يعتبر سلوكاً 'غير أخلاقي' في عملية التفاوض؟", 
            a: ["تقديم معلومات مضللة للتأثير على القرار", "طلب مهلة للتفكير", "اقتراح بدائل جديدة للحل"], 
            c: 0,
            exp: "شرح: التضليل والخداع يدمران الثقة المهنية ويتنافيان مع معايير التفاوض الأخلاقي."
        },
        { 
            q: "ما أهمية 'العدالة والإنصاف' داخل بيئة العمل؟", 
            a: ["لتقليل المصاريف الإدارية", "لخلق بيئة تنافسية شريفة وزيادة الولاء", "لإرضاء الجهات الخارجية فقط"], 
            c: 1,
            exp: "شرح: العدالة تضمن بيئة عمل صحية وتدفع المتدربين والموظفين لبذل أقصى طاقاتهم."
        },
        { 
            q: "ماذا يعني مفهوم 'المرونة الأخلاقية' في التفاوض؟", 
            a: ["التنازل عن القيم مقابل الصفقة", "تعديل الحلول والمواقف دون المساس بالقيم", "تغيير المبادئ حسب الطرف الآخر"], 
            c: 1,
            exp: "شرح: المرونة تعني الانفتاح على طرق مختلفة للوصول للهدف مع الالتزام التام بالنزاهة."
        },
        { 
            q: "يا متدربين، ما هو التصرف الأمثل عند اكتشاف سلوك غير أخلاقي من زميل؟", 
            a: ["التستر عليه", "نصحه أولاً ثم الإبلاغ حسب اللوائح", "نشر الخبر بين الزملاء"], 
            c: 1,
            exp: "شرح: المسؤولية المهنية تتطلب حماية المؤسسة وتطبيق اللوائح لضمان نزاهة بيئة العمل."
        },
        { 
            q: "لماذا يعتبر الالتزام بالاتفاق بعد انتهاء التفاوض ضرورة أخلاقية؟", 
            a: ["لبناء سمعة مهنية طيبة وضمان استمرار العلاقات", "لأنه لا يمكن تغيير الاتفاق أبداً", "خوفاً من العقوبات فقط"], 
            c: 0,
            exp: "شرح: الوفاء بالعهود هو رأسمال المحترف الحقيقي والمؤسسة الناجحة."
        },
        { 
            q: "أي من القيم التالية تمثل 'العمود الفقري' لأخلاقيات المهنة؟", 
            a: ["الربح السريع", "النزاهة والمسؤولية والاحترام", "الطاعة العمياء للأخطاء"], 
            c: 1,
            exp: "شرح: هذه القيم الثلاث هي أساس استقرار أي منظمة مهنية ونجاحها المستدام."
        }
    ];

    let current = 0;
    let score = 0;

    function renderQuestion() {
        if (current >= quizData.length) { showResults(); return; }
        
        const q = quizData[current];
        document.getElementById("question").innerText = q.q;
        document.getElementById("explanation-box").style.display = "none";
        document.getElementById("progress-bar").style.width = ((current + 1) / quizData.length * 100) + "%";
        
        const optsDiv = document.getElementById("options");
        optsDiv.innerHTML = "";
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => check(i, btn);
            optsDiv.appendChild(btn);
        });
    }

    function check(idx, btn) {
        const correct = quizData[current].c;
        const explanation = quizData[current].exp;
        const allBtns = document.querySelectorAll(".opt-btn");
        allBtns.forEach(b => b.disabled = true);

        const expBox = document.getElementById("explanation-box");
        expBox.innerText = explanation;
        expBox.style.display = "block";

        if (idx === correct) {
            btn.classList.add("correct");
            document.getElementById("sound-correct").play();
            score++;
        } else {
            btn.classList.add("wrong");
            allBtns[correct].classList.add("correct");
            document.getElementById("sound-wrong").play();
        }

        setTimeout(() => {
            current++;
            renderQuestion();
        }, 5000); 
    }

    function showResults() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score").innerText = score + " / " + quizData.length;
    }

    function sendWhatsApp() {
        const name = document.getElementById("trainee-name").value;
        if (!name) { alert("من فضلك اكتب اسمك الكامل يا متدرب"); return; }
        
        const msg = encodeURIComponent(`السلام عليكم م. محمد طه،\nأنا المتدرب: ${name}\nأكملت اختبار "التفاوض وأخلاقيات العمل" بنجاح.\nالنتيجة: ${score} من 10\nأرغب في استلام الشهادة المعتمدة (الرسوم: 7000 ج.س).`);
        window.open(`https://wa.me/249999240574?text=${msg}`);
    }

    renderQuestion();
</script>

</body>
</html>
