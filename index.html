<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار احتراف التحليل الاستراتيجي - المطور</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e67e22;
            --accent: #f1c40f;
            --dark: #2d3436;
            --light: #f4f7f6;
            --white: #ffffff;
            --wa-color: #25D366;
            --success: #27ae60;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
            padding: 10px;
        }

        #main-card {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
        }

        h1 { color: var(--primary); margin: 0; font-size: 1.5rem; border-bottom: 3px solid var(--secondary); display: inline-block; padding-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin: 10px 0 20px; font-size: 0.85rem; }

        .progress-container { background: #eee; height: 8px; border-radius: 10px; margin-bottom: 20px; }
        #progress-bar { background: var(--secondary); width: 0%; height: 100%; border-radius: 10px; transition: width 0.4s; }

        .question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; min-height: 50px; line-height: 1.5; }

        .options-grid { display: grid; gap: 10px; }
        .opt-btn {
            padding: 14px;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            background: var(--white);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.2s;
            text-align: right;
        }
        .opt-btn:hover { border-color: var(--secondary); background: #fdf2e9; }
        
        .correct { background: var(--success) !important; color: white; border-color: var(--success) !important; }
        .wrong { background: var(--error) !important; color: white; border-color: var(--error) !important; }

        #explanation-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: #e8f4fd;
            border-right: 5px solid #3498db;
            text-align: right;
            font-size: 0.95rem;
            animation: fadeIn 0.5s;
        }

        #result-screen { display: none; }
        .score-circle { width: 90px; height: 90px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; margin: 0 auto 15px; }

        .fee-info {
            background: #fff9e6;
            color: #d35400;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            margin: 15px 0;
            border: 1px dashed var(--accent);
        }

        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 1rem; }

        .btn-wa { background: var(--wa-color); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="main-card">
    <div id="quiz-screen">
        <h1>🎓 التحليل الاستراتيجي الاحترافي</h1>
        <p class="subtitle">إشراف الأستاذ محمد طه عطا المنان</p>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="question" class="question-text">تحميل الأسئلة...</div>
        <div id="options" class="options-grid"></div>
        <div id="explanation-box"></div>
    </div>

    <div id="result-screen">
        <div class="score-circle" id="final-score">0</div>
        <h2 id="congrats-msg">أحسنتم يا متدربين!</h2>
        <p>الرجاء إدخال اسمكم الثلاثي أدناه</p>
        
        <input type="text" id="trainee-name" placeholder="الاسم الثلاثي للمتدرب">
        
        <div class="fee-info">
            🎫 رسوم استخراج الشهادة المعتمدة: 7,000 جنيه سوداني
        </div>

        <button class="btn-wa" onclick="sendWhatsApp()">
            إرسال النتيجة وطلب الشهادة
        </button>
    </div>
</div>

<audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    const quizData = [
        { 
            q: "يا متدربين، ما هو التركيز الأساسي لتحليل PESTEL؟", 
            a: ["تحليل نقاط القوة والضعف الداخلية", "فحص البيئة الخارجية الكلية (سياسي، اقتصادي، إلخ)", "تحديد رواتب الموظفين"], 
            c: 1,
            exp: "شرح: تحليل PESTEL يركز حصرياً على العوامل الخارجية التي لا تملك المنظمة سيطرة عليها لكنها تؤثر في قراراتها بعيدة المدى."
        },
        { 
            q: "في مصفوفة BCG، ماذا تعني فئة 'الأبقار الحلوب' (Cash Cows)؟", 
            a: ["منتجات في سوق ينمو بسرعة وبحصة منخفضة", "منتجات في سوق ينمو ببطء ولكن حصتها السوقية عالية", "منتجات خاسرة يجب التخلص منها"], 
            c: 1,
            exp: "شرح: الأبقار الحلوب تدر أرباحاً كبيرة وتستخدم هذه الأموال لتمويل مشاريع أخرى (النجوم أو علامات الاستفهام)."
        },
        { 
            q: "حسب نموذج بورتر، متى تزداد قوة 'المشترون' (العملاء)؟", 
            a: ["عندما يكون لديهم خيارات بديلة كثيرة وسهولة في التنقل", "عندما يكون المنتج نادراً جداً", "عندما يقل عدد المنافسين"], 
            c: 0,
            exp: "شرح: كلما توفرت البدائل (السوشيال ميديا مثلاً)، زادت قدرة العميل على التفاوض وفرض شروطه."
        },
        { 
            q: "ماذا يقصد بـ 'المحيط الأزرق' في الاستراتيجية؟", 
            a: ["سوق مليء بالمنافسين والدماء", "سوق مبتكر وجديد لا منافس فيه حالياً", "تخفيض الأسعار لأدنى مستوى"], 
            c: 1,
            exp: "شرح: المحيط الأزرق هو الهروب من المنافسة المباشرة بخلق قيمة فريدة تجعل المنافسة 'غير ذات صلة'."
        },
        { 
            q: "في تحليل SWOT، تعتبر 'القوانين الحكومية الجديدة' عاملاً:", 
            a: ["داخلياً (نقاط قوة أو ضعف)", "خارجياً (فرص أو تهديدات)", "غير مهم في التحليل"], 
            c: 1,
            exp: "شرح: العوامل السياسية والقانونية هي عوامل خارجية تظهر في تحليل PESTEL وتنعكس في SWOT كفرص أو تهديدات."
        },
        { 
            q: "ما هي استراتيجية 'التنويع' في مصفوفة أنسوف (Ansoff)؟", 
            a: ["بيع منتج حالي في سوق حالي", "بيع منتج جديد في سوق جديد تماماً", "تطوير المنتج الحالي فقط"], 
            c: 1,
            exp: "شرح: التنويع هو الخيار الأكثر مخاطرة لأنه يتطلب دخول أسواق جديدة بمنتجات لم يسبق للشركة إنتاجها."
        },
        { 
            q: "ما الهدف من مصفوفة TOWS؟", 
            a: ["مجرد رصد المعلومات", "تحويل تحليل SWOT إلى قرارات واستراتيجيات فعلية", "حساب أرباح السنة الماضية"], 
            c: 1,
            exp: "شرح: TOWS لا تكتفي بالرصد، بل تربط القوة بالفرصة (هجوم) والضعف بالتهديد (بقاء)."
        },
        { 
            q: "في نموذج VRIO، ماذا يعني حرف (R)؟", 
            a: ["العائد (Returns)", "الندرة (Rareness)", "المخاطرة (Risk)"], 
            c: 1,
            exp: "شرح: الندرة تعني أن المورد لا يملكه جميع المنافسين، مما يمنح الشركة ميزة تنافسية."
        },
        { 
            q: "أي من هذه العناصر يتبع لـ 'الأنشطة الأساسية' في سلسلة القيمة؟", 
            a: ["إدارة الموارد البشرية", "العمليات والتصنيع والتسويق", "البنية التحتية للمنظمة"], 
            c: 1,
            exp: "شرح: الأنشطة الأساسية هي التي تساهم مباشرة في خلق المنتج وبيعه، أما الموارد البشرية فهي نشاط داعم."
        },
        { 
            q: "يا متدربين، التحليل الاستراتيجي ليس عملية حسابية بل هو:", 
            a: ["تخمين عشوائي", "تفكير نقدي يربط القوة الداخلية بالفرص الخارجية", "حفظ المصطلحات فقط"], 
            c: 1,
            exp: "شرح: الاحتراف يكمن في ربط الأدوات ببعضها لصناعة منظومة متكاملة تحقق الميزة المستدامة."
        }
    ];

    let current = 0;
    let score = 0;

    function renderQuestion() {
        if (current >= quizData.length) { showResults(); return; }
        
        const q = quizData[current];
        document.getElementById("question").innerText = q.q;
        document.getElementById("explanation-box").style.display = "none";
        document.getElementById("progress-bar").style.width = ((current + 1) / quizData.length * 100) + "%";
        
        const optsDiv = document.getElementById("options");
        optsDiv.innerHTML = "";
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => check(i, btn);
            optsDiv.appendChild(btn);
        });
    }

    function check(idx, btn) {
        const correct = quizData[current].c;
        const explanation = quizData[current].exp;
        const allBtns = document.querySelectorAll(".opt-btn");
        allBtns.forEach(b => b.disabled = true);

        const expBox = document.getElementById("explanation-box");
        expBox.innerText = explanation;
        expBox.style.display = "block";

        if (idx === correct) {
            btn.classList.add("correct");
            document.getElementById("sound-correct").play();
            score++;
        } else {
            btn.classList.add("wrong");
            allBtns[correct].classList.add("correct");
            document.getElementById("sound-wrong").play();
        }

        setTimeout(() => {
            current++;
            renderQuestion();
        }, 4000); // إعطاء 4 ثوانٍ لقراءة الشرح
    }

    function showResults() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score").innerText = score + " / " + quizData.length;
    }

    function sendWhatsApp() {
        const name = document.getElementById("trainee-name").value;
        if (!name) { alert("لطفاً اكتبوا أسماءكم يا متدربين"); return; }
        
        const msg = encodeURIComponent(`السلام عليكم أستاذ محمد طه،\nأنا المتدرب: ${name}\nأكملت اختبار "التحليل الاستراتيجي" بنجاح.\nالنتيجة: ${score} من 10\nأرغب في طلب الشهادة المعتمدة (الرسوم: 7000 ج.س).`);
        window.open(`https://wa.me/249999240574?text=${msg}`);
    }

    renderQuestion();
</script>

</body>
</html>
