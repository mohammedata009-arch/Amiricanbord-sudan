<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار مهارات العرض وإدارة الاجتماعات</title>
    <style>
        :root {
            --primary: #8e44ad;
            --secondary: #2980b9;
            --accent: #f1c40f;
            --dark: #2c3e50;
            --light: #f4f7f6;
            --white: #ffffff;
            --wa-color: #25D366;
            --success: #27ae60;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8e44ad 0%, #3498db 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
            padding: 10px;
        }

        #main-card {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
        }

        h1 { color: var(--primary); margin: 0; font-size: 1.5rem; border-bottom: 3px solid var(--accent); display: inline-block; padding-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin: 10px 0 20px; font-size: 0.85rem; }

        .progress-container { background: #eee; height: 8px; border-radius: 10px; margin-bottom: 20px; }
        #progress-bar { background: var(--success); width: 0%; height: 100%; border-radius: 10px; transition: width 0.4s; }

        .question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; min-height: 50px; line-height: 1.5; }

        .options-grid { display: grid; gap: 10px; }
        .opt-btn {
            padding: 14px;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            background: var(--white);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.2s;
            text-align: right;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--primary); background: #f4eef8; }
        
        .correct { background: var(--success) !important; color: white; border-color: var(--success) !important; }
        .wrong { background: var(--error) !important; color: white; border-color: var(--error) !important; }

        #explanation-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: #e8f4fd;
            border-right: 5px solid #3498db;
            text-align: right;
            font-size: 0.95rem;
            animation: fadeIn 0.5s;
        }

        #result-screen { display: none; }
        .score-circle { width: 90px; height: 90px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; margin: 0 auto 15px; }

        .fee-info {
            background: #fff9e6;
            color: #d35400;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            margin: 15px 0;
            border: 1px dashed var(--accent);
            font-size: 1.1rem;
        }

        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 1rem; }

        .btn-wa { background: var(--wa-color); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="main-card">
    <div id="quiz-screen">
        <h1>🎓 مهارات العرض وإدارة الاجتماعات</h1>
        <p class="subtitle">بإشراف الأستاذ محمد طه عطا المنان</p>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="question" class="question-text">تحميل الأسئلة...</div>
        <div id="options" class="options-grid"></div>
        <div id="explanation-box"></div>
    </div>

    <div id="result-screen">
        <div class="score-circle" id="final-score">0</div>
        <h2 id="congrats-msg">أحسنتم يا متدربين!</h2>
        <p>الرجاء إدخال اسمكم الثلاثي لاعتماد الشهادة</p>
        
        <input type="text" id="trainee-name" placeholder="الاسم الثلاثي للمتدرب">
        
        <div class="fee-info">
            🎫 رسوم الشهادة المعتمدة: 7,000 جنيه سوداني
        </div>

        <button class="btn-wa" onclick="sendWhatsApp()">
            إرسال النتيجة وطلب الشهادة
        </button>
    </div>
</div>

<audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    const quizData = [
        { 
            q: "يا متدربين، ما هي أفضل طريقة لجذب انتباه الجمهور في أول دقيقة من العرض؟", 
            a: ["البدء بالاعتذار عن التوتر", "قراءة السيرة الذاتية كاملة", "طرح سؤال مثير أو ذكر قصة قصيرة"], 
            c: 2,
            exp: "شرح: البداية القوية بقصة أو سؤال تكسر الجمود وتجذب انتباه المتدربين فوراً وتجعلهم متشوقين للمتابعة."
        },
        { 
            q: "ماذا تعني قاعدة (6×6) في تصميم شرائح العرض (Slides)؟", 
            a: ["6 ألوان في 6 شرائح", "6 أسطر كحد أقصى وكل سطر 6 كلمات", "6 صور في كل شريحة"], 
            c: 1,
            exp: "شرح: هذه القاعدة تضمن عدم ازدحام الشريحة بالنصوص، مما يسهل على الجمهور القراءة والتركيز على حديث العارض."
        },
        { 
            q: "ما هو الغرض الأساسي من 'أجندة الاجتماع'؟", 
            a: ["معرفة من سيتغيب", "توضيح النقاط التي ستناقش والالتزام بالوقت", "توزيع المهام بعد الاجتماع"], 
            c: 1,
            exp: "شرح: الأجندة هي خارطة الطريق التي تمنع تشتت النقاش وتضمن استغلال وقت الاجتماع بفعالية."
        },
        { 
            q: "يا متدربين، أين يجب أن يتجه بصر العارض أثناء الإلقاء؟", 
            a: ["نحو الشاشة للقراءة منها", "نحو السقف لتجنب التوتر", "توزيع النظرات على جميع الحاضرين (اتصال بصري)"], 
            c: 2,
            exp: "شرح: الاتصال البصري يشعر كل فرد في الجمهور بأنه مخاطب شخصياً، مما يزيد من معدل التفاعل."
        },
        { 
            q: "في لغة الجسد، ماذا تعني الأيدي المفتوحة أثناء الحديث؟", 
            a: ["الارتباك والضعف", "الصدق والانفتاح والثقة", "الرغبة في إنهاء العرض"], 
            c: 1,
            exp: "شرح: استخدام اليدين المفتوحتين يعطي انطباعاً بالشفافية والتمكن من المادة العلمية."
        },
        { 
            q: "ما هو التصرف الصحيح عند خروج أحد الأعضاء عن موضوع الاجتماع؟", 
            a: ["تجاهله تماماً", "مقاطعته بلباقة وإعادته لنقاط الأجندة", "إنهاء الاجتماع فوراً"], 
            c: 1,
            exp: "شرح: دور مدير الاجتماع هو 'الضبط والسيطرة' لضمان عدم ضياع وقت الحضور في نقاشات جانبية."
        },
        { 
            q: "متى يجب إرسال محضر الاجتماع (Minutes of Meeting) للمشاركين؟", 
            a: ["بعد شهر من الاجتماع", "في غضون 24-48 ساعة من انتهاء الاجتماع", "عند طلبهم لذلك فقط"], 
            c: 1,
            exp: "شرح: الإرسال السريع للمحضر يضمن بقاء القرارات والمهام حية في أذهان المشاركين لبدء التنفيذ."
        },
        { 
            q: "كيف تتعامل مع سؤال لا تعرف إجابته أثناء العرض؟", 
            a: ["اختراع إجابة من خيالك", "الاعتراف بذكاء السؤال ووعد بالبحث عنه والرد لاحقاً", "توبيخ السائل لأنه قاطعك"], 
            c: 1,
            exp: "شرح: الصدق المهني يعزز مصداقيتك؛ فالمدرب الناجح ليس موسوعة، بل هو مرشد متمكن."
        },
        { 
            q: "ما هي أهمية الخلاصة (Conclusion) في نهاية العرض التقديمي؟", 
            a: ["تكرار كل ما قيل بالتفصيل", "تثبيت الأفكار الرئيسية وتقديم دعوة للعمل (Call to Action)", "إعلان موعد الغداء"], 
            c: 1,
            exp: "شرح: الخلاصة هي آخر ما يعلق في ذهن الجمهور، ويجب أن تحتوي على 'ماذا نفعل الآن؟'."
        },
        { 
            q: "يا متدربين، ما هو الوقت المثالي لبداية الاجتماع؟", 
            a: ["عند اكتمال حضور جميع الموظفين", "في الموعد المحدد تماماً لاحترام الوقت", "بعد 15 دقيقة من الموعد المحدد"], 
            c: 1,
            exp: "شرح: البدء في الموعد يرسخ ثقافة الانضباط ويحترم الأشخاص الذين حضروا في وقتهم."
        }
    ];

    let current = 0;
    let score = 0;

    function renderQuestion() {
        if (current >= quizData.length) { showResults(); return; }
        
        const q = quizData[current];
        document.getElementById("question").innerText = q.q;
        document.getElementById("explanation-box").style.display = "none";
        document.getElementById("progress-bar").style.width = ((current + 1) / quizData.length * 100) + "%";
        
        const optsDiv = document.getElementById("options");
        optsDiv.innerHTML = "";
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => check(i, btn);
            optsDiv.appendChild(btn);
        });
    }

    function check(idx, btn) {
        const correct = quizData[current].c;
        const explanation = quizData[current].exp;
        const allBtns = document.querySelectorAll(".opt-btn");
        allBtns.forEach(b => b.disabled = true);

        const expBox = document.getElementById("explanation-box");
        expBox.innerText = explanation;
        expBox.style.display = "block";

        if (idx === correct) {
            btn.classList.add("correct");
            document.getElementById("sound-correct").play();
            score++;
        } else {
            btn.classList.add("wrong");
            allBtns[correct].classList.add("correct");
            document.getElementById("sound-wrong").play();
        }

        setTimeout(() => {
            current++;
            renderQuestion();
        }, 4500); 
    }

    function showResults() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score").innerText = score + " / " + quizData.length;
    }

    function sendWhatsApp() {
        const name = document.getElementById("trainee-name").value;
        if (!name) { alert("من فضلك اكتب اسمك الثلاثي يا متدرب"); return; }
        
        const msg = encodeURIComponent(`السلام عليكم أستاذ محمد طه،\nأنا المتدرب: ${name}\nأتممت اختبار "مهارات العرض والاجتماعات" بنجاح.\nالنتيجة: ${score} من 10\nأرغب في استلام الشهادة المعتمدة (الرسوم: 7000 ج.س).`);
        window.open(`https://wa.me/249999240574?text=${msg}`);
    }

    renderQuestion();
</script>

</body>
</html>
